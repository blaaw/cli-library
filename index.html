<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CLI Library</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
   <header>
        <h1>CLI-Library/</h1>
        <button id="new-cli">New Cli Tool</button>
   </header> 
   <form>
        <label for="form-name">name of new cli tool:</label>
        <input type="text" name="from-name" id="form-name" placeholder="(e.g) lazygit" required>
        
        <label for="form-desc">description:</label>
        <input type="text" name="from-desc" id="form-desc" required>

        <label for="form-url">link of the cheatsheet:</label>
        <input type="text" name="from-url" id="form-url" placeholder="https:://..." required>

        <label for="form-instal">Do you have it Installed?</label>
        <select name="form-instal" id="form-instal" required>
            <option value="true">yes</option>
            <option value="false">no</option>
        </select>
        <button type="submit" id="form-btn">add to Library</button>
   </form>
   <main>
        <!--<article>
            <h3>Sample Cli Tool</h3>
            <p>Description</p>
            <a href="https://jsonplaceholder.typicode.com/">Cheatsheet</a>
            <p>Installed</p>
            <button class="remove-cli">Remove From Library</button>
            <button class="change-installed">Change Installed Status</button>
        </article>-->
   </main>
    <p>Beckham I. Lawrence, 2026</p>
    <script src="app.js"></script>
</body>
</html>
